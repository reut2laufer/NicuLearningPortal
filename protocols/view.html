<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צפייה בנוהל - מרכז הלמידה של אחיות הפגייה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="../assets/favicon-32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
    <style>
        :root {
            --navy: #0c4a6e;
            --blue: #0284c7;
            --bg-soft: #f0f9ff;
            --text-main: #0f172a;
            --text-muted: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        [hidden] {
            display: none !important;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-soft);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        h1, h2 {
            font-family: 'Heebo', sans-serif;
        }

        .viewer-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--blue);
            color: white;
            font-family: 'Heebo', sans-serif;
            font-weight: 700;
            font-size: 14px;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            white-space: nowrap;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: var(--navy);
        }

        .viewer-title {
            flex: 1;
            min-width: 180px;
            font-family: 'Heebo', sans-serif;
            font-weight: 800;
            font-size: clamp(14px, 3vw, 17px);
            color: var(--navy);
        }

        .open-tab {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--blue);
            font-weight: 600;
            font-size: 13.5px;
            text-decoration: none;
            white-space: nowrap;
        }

        .open-tab:hover {
            text-decoration: underline;
        }

        .pdf-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: #64748b;
        }

        .viewer-error {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-align: center;
            padding: 30px 20px;
            color: var(--text-muted);
        }

        .viewer-error i {
            font-size: 44px;
            color: var(--blue);
        }
    </style>
</head>
<body>

    <div class="viewer-toolbar">
        <span class="viewer-title" id="pdf-title"></span>
        <a class="open-tab" id="open-tab" href="#" target="_blank" rel="noopener">
            <i class="fa-solid fa-up-right-from-square"></i>
            פתיחה בכרטיסייה נפרדת
        </a>
    </div>

    <iframe class="pdf-frame" id="pdf-frame" title="תצוגת הנוהל" hidden></iframe>
    <div class="viewer-error" id="pdf-error" hidden>
        <i class="fa-solid fa-file-circle-question"></i>
        <p>הנוהל המבוקש לא נמצא.</p>
        <a class="back-btn" href="protocols.html"><i class="fa-solid fa-arrow-right"></i> חזרה לרשימת הנהלים</a>
    </div>

    <script src="../dist/header.js" defer
            data-title="נהלים והנחיות עבודה"
            data-bg="linear-gradient(135deg, #082f49, #0284c7)"
            data-home="../index.html"
            data-back="protocols.html"></script>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const file = params.get('file') || '';
            const title = params.get('title') || 'צפייה בנוהל';

            const frame = document.getElementById('pdf-frame');
            const error = document.getElementById('pdf-error');
            const titleEl = document.getElementById('pdf-title');
            const openTab = document.getElementById('open-tab');

            // allow only a plain .pdf filename from this folder
            const safe = /^[\w֐-׿ .()-]+\.pdf$/i.test(file)
                && !file.includes('..') && !file.includes('/') && !file.includes('\\');

            if (safe) {
                titleEl.textContent = title;
                document.title = title + ' - מרכז הלמידה של אחיות הפגייה';
                frame.src = encodeURIComponent(file);
                frame.hidden = false;
                openTab.href = encodeURIComponent(file);
            } else {
                error.hidden = false;
                openTab.remove();
            }
        })();
    </script>
</body>
</html>
