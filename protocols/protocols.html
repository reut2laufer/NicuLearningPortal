<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נהלים והנחיות עבודה - מרכז הלמידה של אחיות הפגייה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="../assets/favicon-32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
    <style>
        :root {
            --navy: #0c4a6e;
            --navy-deep: #082f49;
            --blue: #0284c7;
            --cyan: #06b6d4;
            --bg-soft: #f0f9ff;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-soft);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4 {
            font-family: 'Heebo', sans-serif;
        }

        .app-container {
            flex: 1;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 15px 30px;
        }

        .page-intro {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 32px;
            color: var(--text-muted);
            font-size: clamp(15px, 3.2vw, 17px);
        }

        .protocols-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr));
            gap: 25px;
        }

        .protocol-card {
            background: var(--card-bg);
            border-radius: 18px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            border: 1px solid #e2e8f0;
            position: relative;
        }

        .protocol-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.12);
        }

        .protocol-card:active {
            transform: translateY(-2px);
        }

        .pdf-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            background: white;
            color: var(--navy);
            font-family: 'Heebo', sans-serif;
            font-weight: 800;
            font-size: 13px;
            padding: 3px 12px;
            border-radius: 20px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            z-index: 3;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-banner {
            padding: 30px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .card-banner i {
            font-size: 52px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .pc-1 .card-banner { background: linear-gradient(135deg, #0c4a6e, #0369a1); }
        .pc-2 .card-banner { background: linear-gradient(135deg, #1d4ed8, #3b82f6); }
        .pc-3 .card-banner { background: linear-gradient(135deg, #0284c7, #38bdf8); }
        .pc-4 .card-banner { background: linear-gradient(135deg, #0e7490, #06b6d4); }
        .pc-5 .card-banner { background: linear-gradient(135deg, #1e40af, #0ea5e9); }
        .pc-6 .card-banner { background: linear-gradient(135deg, #1e3a8a, #60a5fa); }

        .card-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-body h3 {
            font-size: clamp(16.5px, 3.3vw, 19px);
            font-weight: 800;
        }

        .card-source {
            font-size: clamp(13px, 2.8vw, 14px);
            color: var(--blue);
            font-weight: 600;
        }

        .card-body p {
            color: var(--text-muted);
            font-size: clamp(14px, 3vw, 16px);
            flex: 1;
        }

        .card-cta {
            margin-top: 12px;
            font-family: 'Heebo', sans-serif;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: clamp(14px, 3vw, 16px);
        }

        .pc-1 .card-cta { color: #0369a1; }
        .pc-2 .card-cta { color: #1d4ed8; }
        .pc-3 .card-cta { color: #0284c7; }
        .pc-4 .card-cta { color: #0e7490; }
        .pc-5 .card-cta { color: #1e40af; }
        .pc-6 .card-cta { color: #1d4ed8; }

        .protocol-card:hover .card-cta i {
            transform: translateX(-5px);
        }

        .card-cta i {
            transition: var(--transition);
        }
    </style>
</head>
<body>

    <main class="app-container">
        <p class="page-intro">נהלים, הנחיות קליניות והנחיות עבודה לצוות הפגייה - זמינים לצפייה ולהורדה בכל עת.</p>

        <div class="protocols-grid" id="protocols-grid"></div>
    </main>

    <script>
        // To add a protocol: upload the PDF to this folder and add one
        // entry here - file, title, source line, Font Awesome icon, and a
        // short description. The card is rendered automatically.
        const PROTOCOLS = [
            {
                file: 'hypothermia.pdf',
                title: 'טיפול בהיפותרמיה בינונית (קירור) ביילודים',
                source: 'הנחיה קלינית - האיגוד הישראלי לניאונטולוגיה',
                icon: 'fa-temperature-arrow-down',
                desc: 'טיפול ביילודים (שבוע 36 ומעלה) עם אנצפלופתיה היפוקסית-איסכמית: קריטריונים, קירור ל-33-34 מעלות למשך 72 שעות, מעקב וחימום.',
            },
            {
                file: 'Minimal Handling.pdf',
                title: 'מניעת דימום מוחי בפגים - Minimal Handling',
                source: 'פרוטוקול קליני - המרכז הרפואי הדסה',
                icon: 'fa-brain',
                desc: 'עקרונות המגע המזערי למניעת דימום תוך-חדרי (IVH) בפגים בימי החיים הראשונים - תנוחה, טיפול מקובץ והגבלת גירויים.',
            },
            {
                file: 'alarms.pdf',
                title: 'סימנים חיוניים והתרעות מוניטור',
                source: 'נוהל - המרכז הרפואי הדסה',
                icon: 'fa-wave-square',
                desc: 'טווחי ערכים תקינים בפגים וביילודים, כיוון גבולות התרעה במוניטור ואופן התגובה להתרעות בטיפול נמרץ.',
            },
            {
                file: 'bradicardia.pdf',
                title: 'גישה לטיפול ובירור ברדיקרדיה ביילוד',
                source: 'פרוטוקול - המרכז הרפואי הדסה',
                icon: 'fa-heart-circle-exclamation',
                desc: 'הערכה, בירור וטיפול באירועי ברדיקרדיה ביילוד ובפג - סיבות, ניטור ומדרג ההתערבות.',
            },
            {
                file: 'dietray.pdf',
                title: 'הזנת פגים ויילודים',
                source: 'פרוטוקול קליני - המרכז הרפואי הדסה',
                icon: 'fa-bottle-droplet',
                desc: 'פרוטוקול ההזנה - התחלת הזנה, קצב העלאה, העשרה, מעקב סבילות והזנה בהתאם לגיל ולמשקל.',
            },
            {
                file: 'infusion.pdf',
                title: 'הכנסת עירוי לווריד היקפי ותחזוקתו',
                source: 'נוהל סיעוד - המרכז הרפואי הדסה',
                icon: 'fa-syringe',
                desc: 'הכנסת עירוי היקפי, תחזוקה שוטפת, נטילת דגימות דם ומניעת סיבוכים.',
            },
            {
                file: 'insulin.pdf',
                title: 'טיפול באינסולין בהיפרגליקמיה בפגים',
                source: 'פרוטוקול - המרכז הרפואי הדסה',
                icon: 'fa-vial-circle-check',
                desc: 'התוויות לטיפול באינסולין בפג עם היפרגליקמיה - הכנת העירוי, מינון, טיטרציה וניטור סוכר.',
            },
            {
                file: 'milk.pdf',
                title: 'שימוש וטיפול בחלב אם בבית החולים',
                source: 'נוהל - המרכז הרפואי הדסה',
                icon: 'fa-jar',
                desc: 'שאיבה, סימון, אחסון, הפשרה והגשה בטוחה של חלב אם - כולל מניעת טעויות בזיהוי.',
            },
            {
                file: 'nacl.pdf',
                title: 'ניהול מאזן הנתרן ביילודים חולים ופגים',
                source: 'פרוטוקול - המרכז הרפואי הדסה',
                icon: 'fa-scale-balanced',
                desc: 'ניטור רמות נתרן, חישוב צריכה ותוספות, ותיקון היפונתרמיה והיפרנתרמיה ביילוד ובפג.',
            },
            {
                file: 'pain.pdf',
                title: 'מניעה וטיפול בכאב ביילודים ופגים',
                source: 'נוהל - המרכז הרפואי הדסה',
                icon: 'fa-hand-holding-medical',
                desc: 'הערכת כאב בסרגלים ייעודיים, אמצעים לא-תרופתיים (סוכרוז, עטיפה, הנקה) וטיפול תרופתי בכאב.',
            },
            {
                file: 'paliative.pdf',
                title: 'טיפול פליאטיבי בתינוק הנוטה למות',
                source: 'נוהל - המרכז הרפואי הדסה',
                icon: 'fa-hand-holding-heart',
                desc: 'ליווי התינוק ומשפחתו בסוף החיים - הקלה על סבל, טיפול תומך וכבוד המטופל בטיפול נמרץ.',
            },
            {
                file: 'skin.pdf',
                title: 'שמירה וטיפול בעור פגים ויילודים',
                source: 'פרוטוקול - המרכז הרפואי הדסה',
                icon: 'fa-spa',
                desc: 'הערכת עור, מניעת פגיעות עור ופצעי לחץ, טיפול בעור הפג הצעיר והגנה מפני נזקי קיבוע.',
            },
        ];

        document.getElementById('protocols-grid').innerHTML = PROTOCOLS.map((p, i) => `
            <a class="protocol-card pc-${(i % 6) + 1}" href="view.html?file=${encodeURIComponent(p.file)}&title=${encodeURIComponent(p.title)}">
                <span class="pdf-badge"><i class="fa-solid fa-file-pdf"></i> PDF</span>
                <div class="card-banner">
                    <i class="fa-solid ${p.icon}"></i>
                </div>
                <div class="card-body">
                    <h3>${p.title}</h3>
                    <span class="card-source">${p.source}</span>
                    <p>${p.desc}</p>
                    <span class="card-cta">
                        לצפייה בנוהל
                        <i class="fa-solid fa-arrow-left"></i>
                    </span>
                </div>
            </a>`).join('');
    </script>

    <script src="../dist/header.js" defer
            data-title="נהלים והנחיות עבודה"
            data-bg="linear-gradient(135deg, #082f49, #0284c7)"
            data-home="../index.html"></script>
    <script src="../dist/footer.js" defer data-bg="linear-gradient(135deg, #082f49, #0284c7)"></script>
</body>
</html>
