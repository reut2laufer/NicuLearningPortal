<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צפייה בסרטון - מרכז הלמידה של אחיות הפגייה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="../assets/favicon-32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
    <style>
        :root {
            --navy: #0c4a6e;
            --blue: #0284c7;
            --bg-soft: #f0f9ff;
            --text-main: #0f172a;
            --text-muted: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        [hidden] {
            display: none !important;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-soft);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2 {
            font-family: 'Heebo', sans-serif;
        }

        .watch-wrap {
            flex: 1;
            width: 100%;
            max-width: 950px;
            margin: 0 auto;
            padding: 20px 12px 30px;
        }

        .watch-title {
            font-family: 'Heebo', sans-serif;
            font-weight: 800;
            font-size: clamp(17px, 4vw, 24px);
            color: var(--navy);
            margin-bottom: 14px;
        }

        video {
            width: 100%;
            max-height: 75vh;
            border-radius: 14px;
            background: #0f172a;
            box-shadow: 0 8px 25px rgba(12, 74, 110, 0.2);
        }

        .viewer-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .viewer-error i {
            font-size: 44px;
            color: var(--blue);
        }

        .viewer-error a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--blue);
            color: white;
            font-family: 'Heebo', sans-serif;
            font-weight: 700;
            font-size: 14px;
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <main class="watch-wrap">
        <h2 class="watch-title" id="video-title"></h2>
        <video id="player" controls playsinline preload="metadata" hidden></video>
        <div class="viewer-error" id="video-error" hidden>
            <i class="fa-solid fa-video-slash"></i>
            <p id="video-error-msg">הסרטון המבוקש לא נמצא.</p>
            <a href="videos.html"><i class="fa-solid fa-arrow-right"></i> חזרה לרשימת הסרטונים</a>
        </div>
    </main>

    <script src="../dist/header.js" defer
            data-title="סרטוני הדרכה קליניים"
            data-bg="linear-gradient(135deg, #082f49, #0284c7)"
            data-home="../index.html"
            data-back="videos.html"></script>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const file = params.get('file') || '';
            const title = params.get('title') || 'צפייה בסרטון';

            const player = document.getElementById('player');
            const error = document.getElementById('video-error');
            const errorMsg = document.getElementById('video-error-msg');
            const titleEl = document.getElementById('video-title');

            // allow only a plain video filename from this folder
            const safe = /^[\w֐-׿ .()-]+\.(mp4|m4v|webm|mov)$/i.test(file)
                && !file.includes('..') && !file.includes('/') && !file.includes('\\');

            if (!safe) {
                error.hidden = false;
                return;
            }

            titleEl.textContent = title;
            document.title = title + ' - מרכז הלמידה של אחיות הפגייה';
            player.src = encodeURIComponent(file);
            player.hidden = false;

            player.addEventListener('error', function () {
                player.hidden = true;
                errorMsg.textContent = 'אירעה שגיאה בטעינת הסרטון. ייתכן שהקובץ עדיין לא הועלה במלואו.';
                error.hidden = false;
            });
        })();
    </script>
</body>
</html>
