<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" role="img" aria-label="אחות מטפלת בפג באינקובטור">
  <!-- background blobs -->
  <ellipse cx="470" cy="400" rx="420" ry="300" fill="#e0f2fe"/>
  <ellipse cx="300" cy="300" rx="230" ry="180" fill="#cffafe" opacity="0.7"/>

  <!-- floating accents -->
  <path d="M170 90 C 164 84 161 81 161 77.5 A 4.5 4.5 0 0 1 170 76 A 4.5 4.5 0 0 1 179 77.5 C 179 81 176 84 170 90 Z"
        fill="#06b6d4" transform="translate(30 30) scale(2.2)" opacity="0.9"/>
  <path d="M170 90 C 164 84 161 81 161 77.5 A 4.5 4.5 0 0 1 170 76 A 4.5 4.5 0 0 1 179 77.5 C 179 81 176 84 170 90 Z"
        fill="#f472b6" transform="translate(430 -60) scale(1.4)" opacity="0.9"/>
  <g stroke="#0284c7" stroke-width="7" stroke-linecap="round" opacity="0.55">
    <path d="M84 420 v34 M67 437 h34"/>
    <path d="M836 200 v28 M822 214 h28"/>
    <path d="M646 96 v24 M634 108 h24"/>
  </g>
  <circle cx="120" cy="180" r="8" fill="#38bdf8" opacity="0.6"/>
  <circle cx="860" cy="330" r="10" fill="#22d3ee" opacity="0.5"/>
  <circle cx="790" cy="120" r="6" fill="#0284c7" opacity="0.5"/>

  <!-- monitor -->
  <g>
    <rect x="170" y="330" width="10" height="215" rx="5" fill="#94a3b8"/>
    <rect x="128" y="538" width="94" height="16" rx="8" fill="#64748b"/>
    <rect x="95" y="212" width="160" height="118" rx="16" fill="#0c4a6e" stroke="#22d3ee" stroke-width="4"/>
    <polyline points="112,272 138,272 148,250 162,294 174,258 184,272 238,272"
              fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M228 234 C 225 231 223.5 229.5 223.5 227.7 A 2.3 2.3 0 0 1 228 227 A 2.3 2.3 0 0 1 232.5 227.7 C 232.5 229.5 231 231 228 234 Z"
          fill="#f472b6" transform="scale(1.6) translate(-85 -84)"/>
  </g>

  <!-- shadow under incubator -->
  <ellipse cx="450" cy="618" rx="200" ry="18" fill="#0c4a6e" opacity="0.12"/>
  <ellipse cx="725" cy="618" rx="100" ry="14" fill="#0c4a6e" opacity="0.12"/>

  <!-- incubator -->
  <g>
    <!-- wire from baby to monitor -->
    <path d="M338 402 C 290 415 268 380 254 332" fill="none" stroke="#94a3b8" stroke-width="4" opacity="0.75" stroke-linecap="round"/>
    <!-- dome -->
    <path d="M300 418 Q 300 298 450 298 Q 600 298 600 418 Z" fill="#7dd3fc" opacity="0.35"/>
    <path d="M300 418 Q 300 298 450 298 Q 600 298 600 418" fill="none" stroke="#7dd3fc" stroke-width="5" stroke-linecap="round"/>
    <path d="M330 386 Q 342 322 428 312" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.65"/>
    <!-- baby -->
    <g>
      <rect x="382" y="370" width="172" height="46" rx="23" fill="#fecdd3"/>
      <path d="M414 370 v46 M450 370 v46 M486 370 v46" stroke="#fb7185" stroke-width="4" opacity="0.45"/>
      <circle cx="396" cy="371" r="8" fill="#ffd6a8"/>
      <circle cx="358" cy="390" r="26" fill="#ffd6a8"/>
      <path d="M332 386 a26 26 0 0 1 52 0 z" fill="#fb7185"/>
      <circle cx="358" cy="356" r="6" fill="#fda4af"/>
      <path d="M346 392 q4 3.5 8 0 M362 392 q4 3.5 8 0" stroke="#92400e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M354 402 q4 3 8 0" stroke="#b45309" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="342" cy="398" r="4" fill="#fda4af" opacity="0.6"/>
      <circle cx="374" cy="398" r="4" fill="#fda4af" opacity="0.6"/>
    </g>
    <!-- mattress + deck + cart -->
    <rect x="298" y="416" width="304" height="26" rx="13" fill="#ffffff"/>
    <rect x="288" y="440" width="324" height="34" rx="12" fill="#075985"/>
    <circle cx="322" cy="457" r="8" fill="none" stroke="#bae6fd" stroke-width="3" opacity="0.8"/>
    <circle cx="578" cy="457" r="8" fill="none" stroke="#bae6fd" stroke-width="3" opacity="0.8"/>
    <rect x="302" y="474" width="296" height="92" rx="16" fill="#0c4a6e"/>
    <rect x="326" y="506" width="112" height="12" rx="6" fill="#38bdf8" opacity="0.65"/>
    <rect x="462" y="506" width="60" height="12" rx="6" fill="#38bdf8" opacity="0.4"/>
    <rect x="330" y="566" width="14" height="30" fill="#334155"/>
    <rect x="556" y="566" width="14" height="30" fill="#334155"/>
    <circle cx="337" cy="604" r="13" fill="#334155"/>
    <circle cx="337" cy="604" r="5" fill="#94a3b8"/>
    <circle cx="563" cy="604" r="13" fill="#334155"/>
    <circle cx="563" cy="604" r="5" fill="#94a3b8"/>
  </g>

  <!-- nurse -->
  <g>
    <!-- legs + shoes -->
    <rect x="688" y="512" width="27" height="86" rx="12" fill="#075985"/>
    <rect x="728" y="512" width="27" height="86" rx="12" fill="#075985"/>
    <rect x="676" y="592" width="42" height="17" rx="8" fill="#0c4a6e"/>
    <rect x="722" y="592" width="42" height="17" rx="8" fill="#0c4a6e"/>
    <!-- reaching arm (behind torso) -->
    <path d="M690 414 L 612 434" stroke="#0284c7" stroke-width="27" stroke-linecap="round"/>
    <circle cx="604" cy="437" r="12" fill="#ffd6a8"/>
    <!-- torso -->
    <rect x="666" y="378" width="108" height="152" rx="42" fill="#0284c7"/>
    <!-- pocket with cross -->
    <rect x="734" y="446" width="28" height="24" rx="5" fill="#075985"/>
    <path d="M748 451 v14 M741 458 h14" stroke="#e0f2fe" stroke-width="3.5" stroke-linecap="round"/>
    <!-- second arm down -->
    <path d="M760 416 L 776 486" stroke="#0284c7" stroke-width="27" stroke-linecap="round"/>
    <circle cx="778" cy="492" r="11" fill="#ffd6a8"/>
    <!-- neck + head -->
    <rect x="708" y="358" width="24" height="24" rx="8" fill="#ffd6a8"/>
    <circle cx="720" cy="326" r="41" fill="#ffd6a8"/>
    <!-- hair -->
    <path d="M679 326 a41 41 0 0 1 82 0 l0 -8 q-8 -36 -41 -36 q-33 0 -41 36 z" fill="#5b3a29"/>
    <path d="M679 326 q-4 -14 4 -26 q-8 16 -2 26 z" fill="#5b3a29"/>
    <circle cx="756" cy="284" r="17" fill="#5b3a29"/>
    <!-- face -->
    <circle cx="705" cy="330" r="4" fill="#1f2937"/>
    <circle cx="733" cy="330" r="4" fill="#1f2937"/>
    <path d="M706 346 q13 10 26 0" stroke="#7c2d12" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <circle cx="696" cy="340" r="5" fill="#fda4af" opacity="0.55"/>
    <circle cx="743" cy="340" r="5" fill="#fda4af" opacity="0.55"/>
    <!-- v-neck + stethoscope -->
    <path d="M702 380 l18 16 l18 -16" fill="none" stroke="#075985" stroke-width="6" stroke-linecap="round"/>
    <path d="M700 386 q4 24 14 30" fill="none" stroke="#0c4a6e" stroke-width="5" stroke-linecap="round"/>
    <circle cx="716" cy="420" r="8" fill="#22d3ee" stroke="#0c4a6e" stroke-width="3"/>
  </g>
</svg>
